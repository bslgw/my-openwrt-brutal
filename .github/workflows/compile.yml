name: Build iStoreOS TCP Brutal IPK (Kernel 6.6)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preparation environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget libelf-dev

      - name: Download OpenWrt Linux 6.6 Universal SDK
        run: |
          # 💡 针对你的内核 6.6.127 深度定制：换用 OpenWrt 官方最新稳定的 6.6 内核线 SDK
          SDK_URL="https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz"
          echo "正在从全球镜像站拉取最新 6.6 内核专用工具链..."
          wget -q --tries=5 $SDK_URL -O openwrt-sdk.tar.xz
          tar -xJf openwrt-sdk.tar.xz
          mv openwrt-sdk-* sdk

      - name: Add TCP-Brutal Package Source
        run: |
          cd sdk
          git clone https://github.com/haruue-net/openwrt-tcp-brutal.git package/tcp-brutal
          
          # 规避死锁源
          sed -i 's/git.openwrt.org\/feed\/packages.git/github.com\/openwrt\/packages.git/g' feeds.conf.default
          sed -i 's/git.openwrt.org\/project\/luci.git/github.com\/openwrt\/luci.git/g' feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure Pure Environment
        run: |
          cd sdk
          rm -f .config
          touch .config
          echo "CONFIG_PACKAGE_kmod-tcp-brutal=m" >> .config
          make defconfig

      - name: Compile IPK
        run: |
          cd sdk
          make package/tcp-brutal/compile V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: istoreos-tcp-brutal-ipk-6.6
          path: sdk/bin/targets/x86/64/kmod-tcp-brutal*.ipk
