name: Build iStoreOS TCP Brutal IPK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 顺手消除 Node.js 警告

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preparation environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Download iStoreOS SDK
        run: |
          SDK_URL="https://fw.istoreos.com/24.10/x86_64/sdk/istoreos-sdk-24.10.6-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          echo "正在下载 iStoreOS 官方专属 SDK..."
          wget -q --tries=5 $SDK_URL -O istoreos-sdk.tar.xz
          tar -xJf istoreos-sdk.tar.xz
          mv istoreos-sdk-* sdk

      - name: Add TCP-Brutal Package Source
        run: |
          cd sdk
          git clone https://github.com/haruue-net/openwrt-tcp-brutal.git package/tcp-brutal
          
          # 💡 加强防御：注入镜像源，防止原生源下载死锁
          sed -i 's/git.openwrt.org\/feed\/packages.git/github.com\/openwrt\/packages.git/g' feeds.conf.default
          sed -i 's/git.openwrt.org\/project\/luci.git/github.com\/openwrt\/luci.git/g' feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure Package
        run: |
          cd sdk
          make defconfig
          echo "CONFIG_PACKAGE_kmod-tcp-brutal=m" >> .config
          make defconfig

      - name: Download Dependencies
        run: |
          cd sdk
          # 💡 核心修复：在编译前，让所有依赖强制多线程预下载 3 次，彻底干掉下载不全的问题
          make package/tcp-brutal/download V=s || make package/tcp-brutal/download V=s || make package/tcp-brutal/download V=s

      - name: Compile IPK
        run: |
          cd sdk
          # 单线程编译，如果报错会打印出最确切的一行原因
          make package/tcp-brutal/compile V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: success() # 只有成功时才上传
        with:
          name: istoreos-tcp-brutal-ipk
          path: sdk/bin/targets/x86/64/kmod-tcp-brutal*.ipk
