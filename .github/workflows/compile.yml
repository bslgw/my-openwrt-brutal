name: Build iStoreOS TCP Brutal IPK (Official 24.10.6)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preparation environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget libelf-dev zstd

      - name: Download OpenWrt 24.10.6 Official SDK
        run: |
          # 💡 精准下载与你系统完全一致的 24.10.6（内核 6.6.127）官方 64位 工具链
          SDK_URL="https://downloads.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          echo "正在拉取 OpenWrt 24.10.6 官方工具链..."
          wget -q --tries=5 $SDK_URL -O openwrt-sdk.tar.zst
          tar -I zstd -xf openwrt-sdk.tar.zst
          mv openwrt-sdk-* sdk

      - name: Add TCP-Brutal To Feeds (💡 标准机制)
        run: |
          cd sdk
          # 将 tcp-brutal 作为标准 feed 源引入
          echo "src-git brutal_feed https://github.com/haruue-net/openwrt-tcp-brutal.git" >> feeds.conf.default
          
          # 规避可能卡死的官方源
          sed -i 's/git.openwrt.org\/feed\/packages.git/github.com\/openwrt\/packages.git/g' feeds.conf.default
          sed -i 's/git.openwrt.org\/project\/luci.git/github.com\/openwrt\/luci.git/g' feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject Configuration (💡 核心修复)
        run: |
          cd sdk
          # 1. 先生存一份基础的官方标准配置
          make defconfig
          
          # 2. 强行把 brutal 以及它所依赖的全部内核网络组件一同打包激活
          echo "CONFIG_PACKAGE_kmod-tcp-brutal=m" >> .config
          echo "CONFIG_PACKAGE_kmod-tcp-congestion-advanced=y" >> .config
          
          # 3. 使用 olddefconfig 强制锁定，不给系统在 defconfig 时抹除的机会
          make olddefconfig

      - name: Compile IPK
        run: |
          cd sdk
          # 强行独立编译该模块
          make package/openwrt-tcp-brutal/compile V=s -j$(nproc)

      - name: Collect and Protect Output Files
        run: |
          mkdir -p ../output_artifacts
          
          echo "=== 正在全盘搜寻 24.10.6 编译导出的 IPK 安装包 ==="
          find sdk/bin/ -name "*tcp-brutal*.ipk" -exec cp {} ../output_artifacts/ \; || true
          
          echo "=== 正在深度打捞编译生成的 .ko 内核模块文件（双保险） ==="
          find sdk/build_dir/ -name "*tcp_brutal*.ko" -exec cp {} ../output_artifacts/ \; || true
          
          echo "=== 打包区最终斩获情况 ==="
          ls -la ../output_artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: istoreos-tcp-brutal-24.10.6
          path: output_artifacts/*
