name: Build iStoreOS TCP Brutal IPK (Standard Feed)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preparation environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget libelf-dev zstd

      - name: Download OpenWrt Linux 6.6 Official SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/24.10.1/targets/x86/64/openwrt-sdk-24.10.1-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget -q --tries=5 $SDK_URL -O openwrt-sdk.tar.zst
          tar -I zstd -xf openwrt-sdk.tar.zst
          mv openwrt-sdk-* sdk

      - name: Setup Local Source Feed (💡 核心机制改变)
        run: |
          # 1. 在外面建立一个正规的自定义本地仓库包目录
          mkdir -p custom_feeds/brutal
          git clone https://github.com/haruue-net/openwrt-tcp-brutal.git custom_feeds/brutal/tcp-brutal
          
          cd sdk
          # 2. 将本地目录作为绝对合法的 src-link 写入 feeds.conf
          echo "src-link custom $(pwd)/../custom_feeds" >> feeds.conf.default
          
          # 3. 让系统正规地去读取、刷新并安装这个本地源
          ./scripts/feeds update custom
          ./scripts/feeds install -a -p custom

      - name: Config Package
        run: |
          cd sdk
          # 此时由于通过 feeds 安装，CONFIG_PACKAGE_kmod-tcp-brutal 已经变成了系统认可的合法选项
          echo "CONFIG_PACKAGE_kmod-tcp-brutal=m" > .config
          
          # 让 defconfig 去自动补全底层的依赖依赖依赖树（如 kmod-tcp-congestion）
          make defconfig

      - name: Compile IPK (Standard Mode)
        run: |
          cd sdk
          # 用正统的常规命令编译该模块
          make package/tcp-brutal/compile V=s -j$(nproc)

      - name: Collect Output Files
        run: |
          mkdir -p ../output_artifacts
          
          echo "=== 正在全局搜寻编译结果 ==="
          # 1. 搜寻正统生成的 .ipk 安装包
          find sdk/bin/ -name "*tcp-brutal*.ipk" -exec cp {} ../output_artifacts/ \; || true
          
          # 2. 搜寻生成的底层内核模块 .ko 文件作为双重保险
          find sdk/build_dir/ -name "*tcp_brutal*.ko" -exec cp {} ../output_artifacts/ \; || true
          
          echo "=== 打包区最终收货情况 ==="
          ls -la ../output_artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: istoreos-tcp-brutal-package
          path: output_artifacts/*
