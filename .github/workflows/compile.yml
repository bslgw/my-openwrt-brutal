name: Build iStoreOS TCP Brutal IPK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preparation environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget libelf-dev

      - name: Download iStoreOS SDK
        run: |
          SDK_URL="https://fw.istoreos.com/24.10/x86_64/sdk/istoreos-sdk-24.10.6-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          echo "正在下载 iStoreOS 官方专属 SDK..."
          wget -q --tries=5 $SDK_URL -O istoreos-sdk.tar.xz
          tar -xJf istoreos-sdk.tar.xz
          mv istoreos-sdk-* sdk

      - name: Add TCP-Brutal Package Source
        run: |
          cd sdk
          git clone https://github.com/haruue-net/openwrt-tcp-brutal.git package/tcp-brutal
          
          # 用标准 GitHub 镜像替换可能死锁的源
          sed -i 's/git.openwrt.org\/feed\/packages.git/github.com\/openwrt\/packages.git/g' feeds.conf.default
          sed -i 's/git.openwrt.org\/project\/luci.git/github.com\/openwrt\/luci.git/g' feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure and Fix SDK
        run: |
          cd sdk
          # 强行给编译环境“洗脑”，防止内核树头文件缺失
          make defconfig
          echo "CONFIG_PACKAGE_kmod-tcp-brutal=m" >> .config
          make defconfig

      - name: Compile IPK (with DEBUG Log)
        run: |
          cd sdk
          # 允许捕获错误，即使失败也强制继续走下一步，以便我们看清到底缺了什么
          make package/tcp-brutal/compile V=s || true

      - name: Show Real Error Cause
        run: |
          cd sdk
          echo "==================== 核心报错日志排查大本营 ===================="
          # 强行搜索并打印出导致编译终止的真实错误所在
          find logs/package/ -name "*.txt" -exec tail -n 50 {} \; || true
          echo "==============================================================="
          
          # 检查文件是否其实已经生成了
          if [ -f bin/targets/x86/64/kmod-tcp-brutal*.ipk ]; then
            echo "SUCCESS: 居然成功生成了！"
          else
            echo "ERROR: 确实因为上述报错死掉了。"
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: istoreos-tcp-brutal-ipk
          path: sdk/bin/targets/x86/64/kmod-tcp-brutal*.ipk
