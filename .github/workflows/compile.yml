name: Build iStoreOS TCP Brutal IPK (Force Linux 6.6)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 💡 强行堵住 Node.js 20 的警告嘴

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preparation environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget libelf-dev zstd

      - name: Download OpenWrt Linux 6.6 Official SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/24.10.1/targets/x86/generic/openwrt-sdk-24.10.1-x86-generic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget -q --tries=5 $SDK_URL -O openwrt-sdk.tar.zst
          tar -I zstd -xf openwrt-sdk.tar.zst
          mv openwrt-sdk-* sdk

      - name: Add TCP-Brutal Package Source
        run: |
          cd sdk
          git clone https://github.com/haruue-net/openwrt-tcp-brutal.git package/tcp-brutal

      - name: Overwrite SDK Config To Force Brutal
        run: |
          cd sdk
          # 💡 核心修复：直接将 brutal 写入系统默认的核心配置文件，不给全局扫描删除的机会
          echo "CONFIG_PACKAGE_kmod-tcp-brutal=y" >> feeds.conf.default
          
          # 物理注入：初始化官方最原始的核心配置模板
          cp include/toplevel.config .config
          
          # 强行把默认状态改成预备编译（m = module）
          echo "CONFIG_PACKAGE_kmod-tcp-brutal=m" >> .config
          
          # 用极其温和的方式补全基础链，不刷新全部源
          make oldconfig

      - name: Compile IPK (Direct Target Mode)
        run: |
          cd sdk
          # 💡 核心修复：锁死独立目标进行绝对编译，忽略全局组件
          make package/index
          make package/tcp-brutal/compile V=s -j$(nproc)

      - name: Capture and Emergency Pack IPK
        run: |
          mkdir -p ../output_ipk
          
          echo "=== 正在全盘物理搜寻编译出来的 ipk ==="
          find sdk/bin/ -name "kmod-tcp-brutal*.ipk" || true
          
          # 把抓到的包复制过去
          find sdk/bin/ -name "kmod-tcp-brutal*.ipk" -exec cp {} ../output_ipk/ \;
          
          # 💡 终极兜底：万一 SDK 的打包机制又犯傲娇，我们直接把现场生成的 .ko 驱动内核文件直接打包带走！
          echo "=== 正在搜寻底层内核驱动驱动文件 .ko ==="
          find sdk/build_dir/ -name "tcp_brutal.ko" || true
          find sdk/build_dir/ -name "tcp_brutal.ko" -exec cp {} ../output_ipk/ \;
          
          echo "=== 最终移交给你的救命产物列表 ==="
          ls -la ../output_ipk/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: istoreos-tcp-brutal-ipk-6.6
          path: |
            output_ipk/*
