name: Build iStoreOS TCP Brutal IPK (Full Source Mode)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preparation environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget libelf-dev zstd

      - name: Clone Full OpenWrt 24.10 Source
        run: |
          # 直接拉取官方 24.10 完整源码，拒绝残缺 SDK
          git clone -b openwrt-24.10 --single-branch https://github.com/openwrt/openwrt.git openwrt-source

      - name: Add TCP-Brutal Package Source
        run: |
          cd openwrt-source
          # 将 tcp-brutal 源码拉入正规的 package 目录
          git clone https://github.com/haruue-net/openwrt-tcp-brutal.git package/tcp-brutal
          
          # 更新并安装完整树依赖
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject Complete Kernel Config
        run: |
          cd openwrt-source
          # 1. 强行锁定为标准的 x86_64 平台架构
          echo "CONFIG_TARGET_x86=y" > .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config
          
          # 2. 注入我们的 brutal 模块
          echo "CONFIG_PACKAGE_kmod-tcp-brutal=m" >> .config
          
          # 3. 让完整源码树去自动补全所有缺失的依赖
          make defconfig

      - name: Compile IPK (Full Tree Mode)
        run: |
          cd openwrt-source
          # 仅编译针对我们的独立驱动包及其底层依赖，由于源码完整，绝对能成功生成
          make package/tcp-brutal/compile V=s -j$(nproc)

      - name: Collect Output Files
        run: |
          mkdir -p ../output_artifacts
          
          echo "=== 正在完整源码树中搜寻生成的 ipk ==="
          find openwrt-source/bin/ -name "*tcp-brutal*.ipk" -exec cp {} ../output_artifacts/ \; || true
          
          echo "=== 正在深度搜寻内核驱动文件 .ko 作为备用 ==="
          find openwrt-source/build_dir/ -name "*tcp_brutal*.ko" -exec cp {} ../output_artifacts/ \; || true
          
          echo "=== 最终大获全胜的产物列表 ==="
          ls -la ../output_artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: istoreos-tcp-brutal-full-package
          path: output_artifacts/*
